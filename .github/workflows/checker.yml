name: NexaVPN Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Будет обновляться само каждые 6 часов

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch external configs
        run: |
          # Скачиваем чужие конфиги и добавляем их в наш список
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt >> raw_list.txt
          curl -s https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-all.txt >> raw_list.txt
          echo "External configs merged."

      - name: Run checker
        run: |
          # Здесь запускается твой основной скрипт (убедись, что main.py есть в корне)
          python main.py 

      - name: Commit and Push
        run: |
          git config --global user.name "Nexa-Bot"
          git config --global user.email "bot@nexa.vpn"
          git add online.txt
          git commit -m "NexaVPN: Update online servers from sources" || exit 0
          git push
